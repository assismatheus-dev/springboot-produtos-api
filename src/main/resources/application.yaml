spring:
  application:
    name: spring-boot-essentials
  datasource:
    url: jdbc:postgresql://localhost:5432/spring_p1
    username: postgres
    password: 2404
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
server:
  servlet:
    context-path: /api
